<link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">

<div class="container mt-4">

<h2>📦 Portaria - Registro de Encomendas</h2>

<div class="card p-3 mb-4">

<form action="/registrar" method="post">

<div class="row">

<div class="col">
<input class="form-control" name="apartment" placeholder="Apartamento">
</div>

<div class="col">
<input class="form-control" name="description" placeholder="Descrição">
</div>

<div class="col">
<input class="form-control" name="locker" placeholder="Armário">
</div>

<div class="col">
<button class="btn btn-primary">Registrar</button>
</div>

</div>

</form>

</div>

<form method="get" action="/" class="mb-3">

    <div class="row">
    
    <div class="col">
    <input class="form-control" name="q" placeholder="Buscar apto ou descrição" value="{{q}}">
    </div>
    
    <div class="col">
    <button class="btn btn-secondary">Buscar</button>
    <a class="btn btn-outline-secondary" href="/">Limpar</a>
    </div>
    
    </div>
    
    </form>

<table class="table table-striped">

<tr>
<th>Apartamento</th>
<th>Encomenda (Empresa)</th>
<th>Armário</th>
<th>Data de chegada</th>
<th>Dias na portaria</th>
<th></th>
</tr>

{% for p in packages %}

<tr class="{{p.cor}}">

<td>{{p.apartment}}</td>
<td>{{p.description}}</td>
<td>{{p.locker}}</td>
<td>{{p.arrival}}</td>
<td>{{p.dias}}</td>

<td>
<a class="btn btn-success btn-sm" href="/retirar/{{p.id}}">
Retirar
</a>
</td>

</tr>

{% endfor %}

<a class="btn btn-dark mt-3" href="/historico">
    Ver histórico
    </a>
