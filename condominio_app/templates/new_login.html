{% extends "base.html" %}
{% block title %}Login — Encomendas{% endblock %}

{% block extra_css %}
<style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
    }
    .navbar { display: none; }
    footer { display: none; }
    .login-card {
        border-radius: 14px;
        background: #fff;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
        overflow: hidden;
    }
    .login-header {
        background: linear-gradient(135deg, #343a40 0%, #495057 100%);
        padding: 1.75rem 2rem;
        text-align: center;
        color: #fff;
    }
    .login-header .icon-circle {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.15);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 0.6rem;
    }
    .login-header .icon-circle i {
        font-size: 1.6rem;
    }
    .login-body {
        padding: 1.75rem 2rem 2rem;
    }
    .login-footer {
        font-size: 0.8rem;
        color: #6c757d;
    }
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="w-100" style="max-width: 400px; padding: 1rem;">
        <div class="login-card">
            <div class="login-header">
                <div class="icon-circle">
                    <i class="bi bi-box-seam-fill"></i>
                </div>
                <h5 class="mb-1 fw-bold">Sistema de Encomendas</h5>
                <p class="mb-0 opacity-75 small">Acesse sua conta para continuar</p>
            </div>
            <div class="login-body">
                <form method="post" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label small fw-semibold text-muted">
                            <i class="bi bi-person me-1"></i>Usuário
                        </label>
                        <input type="text" class="form-control" id="username" name="username"
                               placeholder="Seu usuário ou nº do apto" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label small fw-semibold text-muted">
                            <i class="bi bi-lock me-1"></i>Senha
                        </label>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Sua senha" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-1">
                        <i class="bi bi-arrow-right-circle me-1"></i> Entrar
                    </button>
                </form>

                <div class="text-center mt-3 login-footer">
                    <i class="bi bi-info-circle me-1"></i>
                    <strong>Porteiro:</strong> use seu login &bull;
                    <strong>Morador:</strong> use o nº do apartamento
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
