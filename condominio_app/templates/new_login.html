{% extends "base.html" %}
{% block title %}Login — Encomendas{% endblock %}

{% block extra_css %}
<style>
    body {
        background: linear-gradient(135deg, #0d6efd 0%, #6f42c1 100%) !important;
    }
    .navbar, footer { display: none !important; }
</style>
{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-4"
     style="margin-top: -1.5rem;">
    <div class="w-100 px-3" style="max-width: 420px;">
        <div class="card shadow border-0">
            <div class="card-header bg-dark text-center border-0 py-4">
                <i class="bi bi-box-seam-fill text-white fs-1 d-block mb-2"></i>
                <h5 class="text-white fw-bold mb-1">Sistema de Encomendas</h5>
                <p class="text-white-50 small mb-0">Acesse sua conta para continuar</p>
            </div>
            <div class="card-body p-4">
                <form method="post" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Usuário</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light">
                                <i class="bi bi-person text-muted"></i>
                            </span>
                            <input type="text" class="form-control" id="username" name="username"
                                   placeholder="Usuário ou nº do apartamento" required autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light">
                                <i class="bi bi-lock text-muted"></i>
                            </span>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Sua senha" required>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                        </button>
                    </div>
                </form>
                <hr class="my-3">
                <p class="text-center text-muted small mb-0">
                    <i class="bi bi-info-circle me-1"></i>
                    <strong>Porteiro:</strong> use seu login
                    <span class="mx-1">&bull;</span>
                    <strong>Morador:</strong> nº do apartamento
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
