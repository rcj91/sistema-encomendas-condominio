{% extends "base.html" %}
{% block title %}{% if user %}Editar Usuário{% else %}Novo Usuário{% endif %} — Portaria{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('porteiro_usuarios') }}" class="btn btn-outline-secondary btn-sm me-3">
        <i class="bi bi-arrow-left"></i>
    </a>
    <div class="d-flex align-items-center">
        <i class="bi bi-person-{% if user %}gear{% else %}plus{% endif %} fs-4 text-primary me-2"></i>
        <h4 class="mb-0 fw-bold">
            {% if user %}Editar Usuário{% else %}Novo Usuário{% endif %}
        </h4>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-body p-4">
                <form method="post">
                    <div class="row g-3">
                        <!-- Username -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-at me-1 text-primary"></i>Usuário (login)
                            </label>
                            {% if user %}
                                <input type="text" class="form-control" value="{{ user.username }}" disabled>
                            {% else %}
                                <input type="text" class="form-control" name="username"
                                       placeholder="Ex: 301 ou porteiro2" required>
                            {% endif %}
                        </div>

                        <!-- Password -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-lock me-1 text-primary"></i>
                                {% if user %}Nova Senha (deixe vazio para manter){% else %}Senha{% endif %}
                            </label>
                            <input type="password" class="form-control" name="password"
                                   placeholder="{% if user %}Nova senha (opcional){% else %}Senha{% endif %}"
                                   {% if not user %}required{% endif %}>
                        </div>

                        <!-- Name -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-person me-1 text-primary"></i>Nome completo
                            </label>
                            <input type="text" class="form-control" name="name"
                                   placeholder="Ex: Maria da Silva"
                                   value="{{ user.name if user else '' }}">
                        </div>

                        <!-- Role -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-shield me-1 text-primary"></i>Papel
                            </label>
                            <select class="form-select" name="role">
                                <option value="morador" {% if user and user.role == 'morador' %}selected{% endif %}>Morador</option>
                                <option value="porteiro" {% if user and user.role == 'porteiro' %}selected{% endif %}>Porteiro</option>
                            </select>
                        </div>

                        <!-- Apartment -->
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-building me-1 text-primary"></i>Apartamento
                            </label>
                            <input type="text" class="form-control" name="apartment"
                                   placeholder="Ex: 101"
                                   value="{{ user.apartment if user else '' }}">
                        </div>

                        <!-- Block -->
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-buildings me-1 text-primary"></i>Bloco / Torre
                            </label>
                            <input type="text" class="form-control" name="block"
                                   placeholder="Ex: A"
                                   value="{{ user.block if user else '' }}">
                        </div>

                        <!-- Phone -->
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-telephone me-1 text-primary"></i>Telefone
                            </label>
                            <input type="text" class="form-control" name="phone"
                                   placeholder="(11) 99999-0000"
                                   value="{{ user.phone if user else '' }}">
                        </div>

                        <!-- Email -->
                        <div class="col-12">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-envelope me-1 text-primary"></i>E-mail
                            </label>
                            <input type="email" class="form-control" name="email"
                                   placeholder="morador@email.com"
                                   value="{{ user.email if user else '' }}">
                        </div>
                    </div>

                    <hr>
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('porteiro_usuarios') }}" class="btn btn-outline-secondary px-4">
                            Cancelar
                        </a>
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-check-lg me-1"></i>
                            {% if user %}Salvar Alterações{% else %}Criar Usuário{% endif %}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
